<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>

<style>
body{
    font-family: Arial;
    background-image: url("images/pexels-pixelcop-2680270.jpg");
    background-size: cover;
    background-position: center;
}

.login-container{
    width:350px;
    margin:120px auto;
    padding:30px;        
    background: linear-gradient(
        45deg,rgb(255, 3, 3),rgb(118, 8, 221),magenta,green,orange
    );
      background-size: 500%;
               
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    
}

input{
    width:93%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    cursor:pointer;

}
.in{
      display: flex;
    align-items: center;
    background: #eaeaea;
    border-radius: 6px;
    padding: 8px;
}
.bb{
                padding: 15px 40px;
                border: none;
                outline: none;
                color: beige;
                cursor: pointer;
                position: relative;
                z-index: 0;
                border-radius: 12px;
            }
            .bb::after{
                content: "";
                z-index: -1;
                position: absolute;
                top: 0;
                width: 100%;
                height: 100%;
                background-color: black;
                left: 0;
               border-radius: 10px;           
            }
            .bb::before{
                content: "";
                position: absolute;
                top: -2px;
                left: -2px;
                width: calc(100% + 4px);
                height: calc(100% + 4px);
                background: linear-gradient(
                45deg,
                red, orange, yellow, green, cyan, blue, magenta, red
                );
                background-size: 600%;
                filter: blur(6px);
                z-index: -1;
                border-radius: 12px;

                animation: glowing 20s linear infinite; /* IMPORTANT */
              }
             @keyframes glowing{
                0%{background-position: 0 0;}
                50%{background-position: 400% 0;}
                100%{background-position: 0 0;}
             }
             .bb:hover::before{
                opacity: 1;
             }
             .bb:active::after{
                background: transparent;
             }
             .bb:active{
                color: rgb(18, 25, 2);
                font-weight: bold;
             }
         .option {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.remember-text {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.remember-text input {
  position: relative;
  top: 1px;  
  /* margin-top: 10px; */}
  .hed{
      
    animation: bounce 0.8s ease-in-out infinite;
  }
    @keyframes bounce {
       0% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-20px); 
    }
    100% {
        transform: translateY(0); 
    }
        
    }
  
</style>

<script>
function login(event){
    event.preventDefault();   
    var username = document.getElementById("username").value;
    var password = document.getElementById("password").value;

    if(username == "1234" && password == "1234"){
        window.location.href = "web.html";
    }
    else{
        alert("Invalid Username or Password");
    }
}
</script>

</head>

<body>

<div class="login-container">
<h2 class="hed">Login</h2>

<form onsubmit="login(event); return false;">
<input id="username" class="in" type="text" placeholder="Username" required>
<input id="password" class="in" type="password" placeholder="Password" required>
<button class="bb" type="submit" >Login</button>
<div class="option">
<label class="remember-text"><input type="checkbox">Remember me </label>
<a href="#">Forget password</a></div>
</form>

</div>

</body>
</html>
