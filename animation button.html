<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>animation</title>

<style>
body {
   background: radial-gradient(circle at center, #0d2acc, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Circle container */
.container {
    width: 40vh;
    height: 40vh;
    background-color: #ef7b16;
    display: flex;  
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    position: relative;
     box-shadow: 
        inset 0 0 30px rgba(255,255,255,0.1),
        0 0 30px rgba(0,0,0,0.6);
}

/* Rotating element */
.box {
    animation: ani 13s linear infinite;
}

/* BUTTON (same size as old box) */
.bb {
    width: 5vh;
    height: 5vh;
    padding: 0; /* remove padding so size stays fixed */
    border: none;
    outline: none;
    color: beige;
    cursor: pointer;
    position: relative;
    z-index: 0;
    border-radius: 50%;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 10px;
}

/* inner background */
.bb::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: black;
    border-radius: 50%;
    z-index: -1;
}

/* glowing border */
.bb::before {
    content: "";
    position: absolute;
    top: -2px;
    left: -2px;
    width: calc(100% + 4px);
    height: calc(100% + 4px);
    background: linear-gradient(
        45deg,
        red, orange, yellow, green, cyan, blue, magenta, red
    );
    background-size: 600%;
    filter: blur(6px);
    z-index: -1;
    border-radius: 50%;
    animation: glowing 20s linear infinite;
}

/* animation */
@keyframes glowing {
    0% { background-position: 0 0; }
    50% { background-position: 400% 0; }
    100% { background-position: 0 0; }
}

/* hover */
.bb:hover::before {
    opacity: 1;
}

/* click */
.bb:active::after {
    background: transparent;
}

.bb:active {
    color: rgb(18, 25, 2);
    font-weight: bold;
}

/* rotation animation */
@keyframes ani {
    from {
        transform: rotate(0deg) translateX(150px) rotate(0deg);
    }
    to {
        transform: rotate(360deg) translateX(150px) rotate(-360deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="box">
        <button class="bb">Go</button>
    </div>
</div>

</body>
</html>
